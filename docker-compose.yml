services:
  maflplus-favicon-api:
    #build: .
    image: ghcr.io/r0gger/maflplus-favicon-api:latest
    container_name: maflplus-favicon-api
    restart: unless-stopped
    ports:
      - "3100:3000"
    volumes:
      - favicon-cache:/cache
    environment:
      - PORT=3000
      - CACHE_DIR=/cache
      - MEMORY_CACHE_MAX=500 # default is 500
      - MEMORY_CACHE_TTL=3600 # default is 3600
      - DISK_CACHE_TTL=86400 # default is 86400
      - CACHE_SIZE_MB=512 # max total disk cache size in MB; 0 = unlimited
      - UPSTREAM_TIMEOUT=5000 # default is 5000
      - UV_THREADPOOL_SIZE=16 # default is 16
      - WORKERS=2 # default is 2
      - SCRAPER_PROBE_BATCH_SIZE=4 # default is 4
      - PICK_HEAD_START_MS=150 # default is 150
      - DEFAULT_PROVIDER=scraper # default is scraper
      - LOGODEV_TOKEN=
      - BESTICON_URL=http://besticon:8080
    depends_on:
      besticon:
        condition: service_healthy
    networks:
      - besticon

  besticon:
    image: matthiasluedtke/iconserver:latest
    container_name: besticon
    restart: unless-stopped
    environment:
      TZ: Europe/Amsterdam
      ADDRESS: ""
      CACHE_SIZE_MB: 1024
      HOST_ONLY_DOMAINS: "*"
      HTTP_CLIENT_TIMEOUT: 5s
      HTTP_MAX_AGE_DURATION: 720h
      HTTP_USER_AGENT: ""
      PORT: 8080
      SERVER_MODE: redirect
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --tries=1
        - --spider
        - http://localhost:8080/up
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - besticon

networks:
  besticon:
    name: besticon
    driver: bridge

volumes:
  favicon-cache:
