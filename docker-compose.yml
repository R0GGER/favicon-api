services:
  favicon-proxy:
    build: .
    container_name: favicon-proxy
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - favicon-cache:/cache
    environment:
      - PORT=3000
      - CACHE_DIR=/cache
      - MEMORY_CACHE_MAX=500
      - MEMORY_CACHE_TTL=3600
      - DISK_CACHE_TTL=86400
      - UPSTREAM_TIMEOUT=5000

volumes:
  favicon-cache:
